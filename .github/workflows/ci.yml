name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv==0.11.15

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        run: cd apps/api && uv sync --locked

      - name: Check exact versions
        run: pnpm check:versions

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Evaluate extraction metrics
        run: cd apps/api && uv run python scripts/evaluate_extraction.py

      - name: Audit JS production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Audit Python dependencies
        run: cd apps/api && uv run pip-audit

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv==0.11.15

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        run: cd apps/api && uv sync --locked

      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
